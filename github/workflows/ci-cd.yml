name: Java CI/CD with Docker and K8s

on:
  push:
    branches: [ "main" ] # Triggers whenever you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # The "Runner" - a fresh virtual machine provided by GitHub

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Step 1: Pull your code into the runner

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Step 2: Install Java 17
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests # Step 3: Create the .jar file

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # Step 4: Authenticate with Docker Hub
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/crud-app:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/crud-app:latest

      # Conceptual Deployment Step
      - name: Update K8s Manifest
        run: |
          echo "In a real prod environment, we would use 'kubectl set image' here 
          or update the k8s/app.yaml with the new tag."