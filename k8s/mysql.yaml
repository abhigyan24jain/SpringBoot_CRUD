---
# 1. The Service (Internal DNS for MySQL)
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  ports:
    - port: 3306
  selector:
    app: mysql
---
# 2. The Deployment (The Pod running MySQL)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_DATABASE
              value: tekboot
            - name: MYSQL_ROOT_PASSWORD
              value: root
          ports:
            - containerPort: 3306